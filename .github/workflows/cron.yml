name: AND센터 크론 파이프라인

on:
  schedule:
    # KST = UTC+9 (평일 5회)
    - cron: "0 0 * * 1-5"  # KST 09:00
    - cron: "0 2 * * 1-5"  # KST 11:00
    - cron: "0 5 * * 1-5"  # KST 14:00
    - cron: "0 7 * * 1-5"  # KST 16:00
    - cron: "0 9 * * 1-5"  # KST 18:00
  workflow_dispatch: # 대시보드에서 수동 트리거 가능

jobs:
  trigger-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Vercel 크론 호출
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://x-bot-iota.vercel.app/api/cron)
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Status: $status"
          echo "Response: $body"
          if [ "$status" != "200" ]; then
            echo "크론 실패: HTTP $status"
            exit 1
          fi

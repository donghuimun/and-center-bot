name: AND센터 크론 파이프라인

on:
  schedule:
    # KST = UTC+9 (평일 5회) — 출근길/점심/퇴근길 최적화
    - cron: "10 23 * * 0-4"  # KST 08:10 출근길 (UTC 전날 23:10)
    - cron: "25 1 * * 1-5"   # KST 10:25 오전 업무
    - cron: "40 3 * * 1-5"   # KST 12:40 점심 (핵심 슬롯)
    - cron: "0 6 * * 1-5"    # KST 15:00 오후 슬럼프
    - cron: "10 8 * * 1-5"   # KST 17:10 퇴근길 (핵심 슬롯)
  workflow_dispatch: # 대시보드에서 수동 트리거 가능

jobs:
  trigger-cron:
    runs-on: ubuntu-latest
    steps:
      - name: Vercel 크론 호출
        run: |
          response=$(curl -s -w "\n%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://x-bot-iota.vercel.app/api/cron)
          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n 1)
          echo "Status: $status"
          echo "Response: $body"
          if [ "$status" != "200" ]; then
            echo "크론 실패: HTTP $status"
            exit 1
          fi
